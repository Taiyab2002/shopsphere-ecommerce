<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shop | ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://kit.fontawesome.com/70a642cd7c.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/shop.css">

</head>

<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3 text-primary" href="../index.html">
            ShopSphere
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="../index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="shop.html">Shop</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Categories</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>

            </ul>

            <div class="d-flex gap-3 align-items-center">

                <a href="#" class="text-dark">
                    <i class="fas fa-search"></i>
                </a>

                <a href="#" class="text-dark">
                    <i class="far fa-heart"></i>
                </a>

                <a href="#" class="text-dark position-relative">

                    <i class="fas fa-shopping-cart"></i>

                    <span
                        id="cart-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                        0

                    </span>

                </a>

            </div>

        </div>

    </div>

</nav>

<section class="shop-banner">

    <div class="container text-center">

        <h1>Our Shop</h1>

        <p>
            Discover premium quality products at the best prices.
        </p>

    </div>

</section>

<section class="py-5">

    <div class="container">

        <div class="row mb-4">

            <div class="col-lg-4">

                <input
                    type="text"
                    class="form-control"
                    placeholder="Search products...">

            </div>

            <div class="col-lg-4">

                <select class="form-select">

                    <option>All Categories</option>
                    <option>Shoes</option>
                    <option>Watch</option>
                    <option>Bag</option>
                    <option>Electronics</option>
                    <option>Phone</option>

                </select>

            </div>

            <div class="col-lg-4">

                <select class="form-select">

                    <option>Sort By</option>
                    <option>Newest</option>
                    <option>Price Low to High</option>
                    <option>Price High to Low</option>

                </select>

            </div>

        </div>

        <div class="row g-4" id="product-list">

                    </div>

        <nav class="mt-5">

            <ul class="pagination justify-content-center">

                <li class="page-item active">
                    <a class="page-link" href="#">1</a>
                </li>

                <li class="page-item">
                    <a class="page-link" href="#">2</a>
                </li>

                <li class="page-item">
                    <a class="page-link" href="#">3</a>
                </li>

            </ul>

        </nav>

    </div>

</section>

<footer class="bg-dark text-white py-4">

    <div class="container text-center">

        <p class="mb-0">
            © 2026 ShopSphere. All Rights Reserved.
        </p>

    </div>

</footer>

<script src="../assets/js/product.js"></script>

<script src="../assets/js/shop.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
