<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Shop | ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://kit.fontawesome.com/70a642cd7c.js"
            crossorigin="anonymous"></script>

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <link rel="stylesheet"
          href="../assets/css/navbar.css">

    <link rel="stylesheet"
          href="../assets/css/shop.css">

    <link rel="stylesheet"
          href="../assets/css/product.css">

    <link rel="stylesheet"
          href="../assets/css/footer.css">

    <link rel="stylesheet"
          href="../assets/css/toast.css">

    <link rel="stylesheet"
          href="../assets/css/theme.css">

    <link rel="stylesheet"
          href="../assets/css/responsive.css">

</head>

<body>

<div id="navbar-container"></div>

<section class="shop-banner">

    <div class="banner-glow glow-1"></div>
    <div class="banner-glow glow-2"></div>

    <div class="container">

        <div class="row align-items-center">

            <div class="col-lg-7">

                <span class="shop-badge">

                    PREMIUM COLLECTION

                </span>

                <h1 class="shop-title">

                    Discover

                    <span>Premium</span>

                    Products

                </h1>

                <p class="shop-subtitle">

                    Explore thousands of carefully selected products,
                    exclusive collections and premium brands with
                    fast delivery and secure shopping.

                </p>

                <nav class="shop-breadcrumb">

                    <a href="../index.html">

                        Home

                    </a>

                    <i class="fa-solid fa-angle-right"></i>

                    <span>

                        Shop

                    </span>

                </nav>

            </div>

            <div class="col-lg-5">

                <div class="shop-banner-scene">

                    <div class="banner-circle circle-1"></div>
                    <div class="banner-circle circle-2"></div>

                    <img
                        class="banner-product product-1"
                        src="../assets/images/hero/shoe.png"
                        alt="Shoe">

                    <img
                        class="banner-product product-2"
                        src="../assets/images/hero/watch.png"
                        alt="Watch">

                    <img
                        class="banner-product product-3"
                        src="../assets/images/hero/headphone.png"
                        alt="Headphone">

                </div>

            </div>

        </div>

    </div>

</section>

<section class="py-5">

    <div class="container">

       <div class="row mb-4">

    <div class="col-lg-4 mb-3">

        <div class="premium-search">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                id="search-input"
                type="text"
                class="form-control premium-input"
                placeholder="Search premium products...">

        </div>

    </div>

    <div class="col-lg-4 mb-3">

        <div class="premium-select">

            <i class="fa-solid fa-layer-group"></i>

            <select
                id="category-filter"
                class="form-select premium-input">

                <option value="All">All Categories</option>
                <option value="Shoes">Shoes</option>
                <option value="Watch">Watch</option>
                <option value="Electronics">Electronics</option>
                <option value="Phone">Phone</option>
                <option value="Bag">Bag</option>

            </select>

        </div>

    </div>

    <div class="col-lg-4 mb-3">

        <div class="premium-select">

            <i class="fa-solid fa-arrow-down-wide-short"></i>

            <select
                id="sort-filter"
                class="form-select premium-input">

                <option value="default">Sort By</option>
                <option value="low-high">Price Low to High</option>
                <option value="high-low">Price High to Low</option>
                <option value="a-z">Name A - Z</option>
                <option value="z-a">Name Z - A</option>

            </select>

        </div>

    </div>

</div>

<div class="results-bar">

    <div class="results-left">

        <span id="results-count">

            Showing 0 Products

        </span>

    </div>

    <div
        id="active-filters"
        class="active-filters">

    </div>

</div>

        <div
            id="product-list"
            class="row g-4">

            <!-- Products will load here -->

        </div>
                <nav class="mt-5">

            <ul
                id="pagination"
                class="pagination justify-content-center">

                <li class="page-item active">

                    <a
                        class="page-link"
                        href="#">

                        1

                    </a>

                </li>

                <li class="page-item">

                    <a
                        class="page-link"
                        href="#">

                        2

                    </a>

                </li>

                <li class="page-item">

                    <a
                        class="page-link"
                        href="#">

                        3

                    </a>

                </li>

            </ul>

        </nav>

    </div>

</section>

<div id="toast-container"></div>

<div id="footer-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/product.js"></script>

<script src="../assets/js/shop.js"></script>

<script src="../assets/js/components.js"></script>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/theme.js"></script>

</body>

</html>
