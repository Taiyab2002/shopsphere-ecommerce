<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Shop | ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://kit.fontawesome.com/70a642cd7c.js"
            crossorigin="anonymous"></script>

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <link rel="stylesheet"
          href="../assets/css/shop.css">

</head>

<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3 text-primary"
           href="../index.html">

            ShopSphere

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="menu">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="../index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="shop.html">

                        Shop

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Categories

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        About

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Contact

                    </a>

                </li>

            </ul>

            <div class="d-flex gap-3 align-items-center">

                <a href="#"
                   class="text-dark">

                    <i class="fas fa-search"></i>

                </a>

                <a href="#"
                   class="text-dark">

                    <i class="far fa-heart"></i>

                </a>

                <a href="cart.html"
                   class="text-dark position-relative">

                    <i class="fas fa-shopping-cart"></i>

                    <span id="cart-count"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                        0

                    </span>

                </a>

            </div>

        </div>

    </div>

</nav>

<section class="shop-banner">

    <div class="container text-center">

        <h1>

            Our Shop

        </h1>

        <p>

            Discover premium quality products at the best prices.

        </p>

    </div>

</section>

<section class="py-5">

<div class="container">

<div class="row mb-4">

<div class="col-lg-4 mb-3">

<input
id="search-input"
type="text"
class="form-control"
placeholder="Search products...">

</div>

<div class="col-lg-4 mb-3">

<select
id="category-filter"
class="form-select">

<option value="All">

All Categories

</option>

<option value="Shoes">

Shoes

</option>

<option value="Watch">

Watch

</option>
<option value="Electronics">

    Electronics

</option>

<option value="Phone">

    Phone

</option>

<option value="Bag">

    Bag

</option>

</select>

</div>

<div class="col-lg-4 mb-3">

<select
id="sort-filter"
class="form-select">

<option value="default">

    Sort By

</option>

<option value="low-high">

    Price Low to High

</option>

<option value="high-low">

    Price High to Low

</option>

<option value="a-z">

    Name A - Z

</option>

<option value="z-a">

    Name Z - A

</option>

</select>

</div>

</div>

<div
id="product-list"
class="row g-4">

<!-- Products will be loaded dynamically -->

</div>

<nav class="mt-5">

<ul
id="pagination"
class="pagination justify-content-center">

<li class="page-item active">

<a class="page-link"
href="#">

1

</a>

</li>

<li class="page-item">

<a class="page-link"
href="#">

2

</a>

</li>

<li class="page-item">

<a class="page-link"
href="#">

3

</a>

</li>

</ul>

</nav>

</div>

</section>

<div
class="toast-container position-fixed top-0 end-0 p-3">

<div
id="cartToast"
class="toast align-items-center text-bg-success border-0"
role="alert">

<div class="d-flex">

<div
id="toast-message"
class="toast-body">

Product added successfully!

</div>

<button
type="button"
class="btn-close btn-close-white me-2 m-auto"
data-bs-dismiss="toast">

</button>

</div>

</div>

</div>
<footer class="bg-dark text-white py-4">

    <div class="container text-center">

        <p class="mb-0">

            © 2026 ShopSphere. All Rights Reserved.

        </p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/product.js"></script>

<script src="../assets/js/shop.js"></script>

</body>

</html>
