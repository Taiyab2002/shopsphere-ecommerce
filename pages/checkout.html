<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Checkout | ShopSphere</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<script src="https://kit.fontawesome.com/70a642cd7c.js"
crossorigin="anonymous"></script>

<link rel="stylesheet"
href="../assets/css/style.css">

<link rel="stylesheet"
href="../assets/css/checkout.css">

</head>

<body>

<div id="navbar-container"></div>

<section class="py-5">

<div class="container">

<h2 class="fw-bold mb-5">

Checkout

</h2>

<div class="row">

<div class="col-lg-7">

<div class="card shadow border-0 rounded-4">

<div class="card-body">

<h4 class="mb-4">

Billing Information

</h4>

<form id="checkout-form">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Full Name

</label>

<input
id="fullname"
type="text"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<input
id="phone"
type="text"
class="form-control"
required>

</div>

<div class="col-12 mb-3">

<label class="form-label">

Email Address

</label>

<input
id="email"
type="email"
class="form-control"
required>

</div>

<div class="col-12 mb-3">

<label class="form-label">

Street Address

</label>

<input
id="address"
type="text"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

City

</label>

<input
id="city"
type="text"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

ZIP Code

</label>

<input
id="zip"
type="text"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Currency

</label>

<select
id="currency"
class="form-select">

<option value="USD">

USD ($)

</option>

<option value="BDT">

BDT (৳)

</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Payment Method

</label>

<select
id="payment"
class="form-select">

<option>

Credit Card

</option>

<option>

PayPal

</option>

</select>

</div>

<div class="col-12">

<div
id="payment-note"
class="alert alert-info">

International payment is selected.

</div>

</div>
<div class="col-12 mt-4">

<button
id="place-order-btn"
type="submit"
class="btn btn-primary w-100 py-3">

<i class="fas fa-lock me-2"></i>

Place Order

</button>

</div>

</div>

</form>

</div>

</div>

</div>

<div class="col-lg-5">

<div class="card shadow border-0 rounded-4 summary-card">

<div class="card-body">

<h4 class="mb-4">

Order Summary

</h4>

<div id="checkout-items">

<!-- JS -->

</div>

<hr>

<div class="d-flex justify-content-between mb-3">

<span>

Subtotal

</span>

<strong id="checkout-subtotal">

$0.00

</strong>

</div>

<div class="d-flex justify-content-between mb-3">

<span>

Shipping

</span>

<strong>

Free

</strong>

</div>

<div class="d-flex justify-content-between mb-3">

<span>

Estimated Delivery

</span>

<strong id="delivery-text">

7-14 Business Days

</strong>

</div>

<hr>

<div class="d-flex justify-content-between">

<span class="fw-bold fs-5">

Total

</span>

<strong
id="checkout-total"
class="text-primary fs-5">

$0.00

</strong>

</div>

</div>

</div>

</div>

</div>

</div>

</section>

<div id="footer-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/product.js"></script>

<script src="../assets/js/checkout.js"></script>

<script src="../assets/js/components.js"></script>

</body>

</html>
