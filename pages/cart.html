<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shopping Cart | ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://kit.fontawesome.com/70a642cd7c.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/cart.css">

</head>

<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3 text-primary" href="../index.html">
            ShopSphere
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="../index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="shop.html">Shop</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="#">Cart</a>
                </li>

            </ul>

            <div class="d-flex gap-3">

                <a href="#" class="text-dark">
                    <i class="fas fa-search"></i>
                </a>

                <a href="#" class="text-dark">
                    <i class="far fa-heart"></i>
                </a>

                <a href="cart.html" class="text-dark position-relative">

                    <i class="fas fa-shopping-cart"></i>

                    <span id="cart-count"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                        0

                    </span>

                </a>

            </div>

        </div>

    </div>

</nav>

<section class="py-5">

    <div class="container">

        <h2 class="text-center mb-5">
            Shopping Cart
        </h2>

        <div class="row">

            <div class="col-lg-8">

                <div id="cart-items">

                    <!-- JavaScript will render cart items here -->

                </div>

            </div>

            <div class="col-lg-4">

               <div class="card shadow border-0 rounded-4 summary-card">

                    <div class="card-body">

                        <h4 class="mb-4">
                            Order Summary
                        </h4>

                        <div class="d-flex justify-content-between mb-3">

                            <span>Subtotal</span>

                            <strong id="subtotal">
                                $0.00
                            </strong>

                        </div>

                        <div class="d-flex justify-content-between mb-3">

                            <span>Shipping</span>

                            <strong>
                                Free
                            </strong>

                        </div>

                        <hr>

                                                <div class="d-flex justify-content-between mb-4">

                            <span class="fs-5 fw-bold">
                                Total
                            </span>

                            <strong class="fs-5 text-primary" id="total">
                                $0.00
                            </strong>

                        </div>

                        <button class="btn btn-primary w-100 py-3">

                            <i class="fas fa-credit-card me-2"></i>

                            Proceed to Checkout

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<footer class="bg-dark text-white py-4">

    <div class="container text-center">

        <p class="mb-0">
            © 2026 ShopSphere. All Rights Reserved.
        </p>

    </div>

</footer>

<script src="../assets/js/products.js"></script>
<script src="../assets/js/cart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
