<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://kit.fontawesome.com/70a642cd7c.js"
            crossorigin="anonymous"></script>

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <link rel="stylesheet"
          href="../assets/css/navbar.css">

    <link rel="stylesheet"
          href="../assets/css/auth.css">

    <link rel="stylesheet"
          href="../assets/css/footer.css">

    <link rel="stylesheet"
          href="../assets/css/toast.css">

    <link rel="stylesheet"
          href="../assets/css/theme.css">

    <link rel="stylesheet"
          href="../assets/css/responsive.css">

</head>

<body class="bg-light">

<div id="navbar-container"></div>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-8">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<div class="text-center mb-4">

<h2 class="fw-bold">

Create Account

</h2>

<p class="text-muted">

Join ShopSphere and start shopping

</p>

</div>

<div class="d-grid gap-3 mb-4">

<button
type="button"
class="btn btn-light border rounded-pill py-3 social-btn">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
class="social-logo me-2"
alt="Google">

Continue with Google

</button>

<button
type="button"
class="btn btn-light border rounded-pill py-3 social-btn">

<i class="fab fa-facebook text-primary me-2"></i>

Continue with Facebook

</button>

<button
type="button"
class="btn btn-light border rounded-pill py-3 social-btn">

<i class="fab fa-apple me-2"></i>

Continue with Apple

</button>

</div>

<div class="text-center mb-4">

<span class="text-muted">

──────── OR ────────

</span>

</div>

<form id="register-form">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-user"></i>

</span>

<input
type="text"
id="register-name"
class="form-control"
placeholder="Enter your full name"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Username

</label>

<div class="input-group">

<span class="input-group-text">

@

</span>

<input
type="text"
id="register-username"
class="form-control"
placeholder="Choose a username"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Email / Phone Number

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-envelope"></i>

</span>

<input
type="text"
id="register-email"
class="form-control"
placeholder="Enter email or phone number"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-lock"></i>

</span>

<input
type="password"
id="register-password"
class="form-control"
placeholder="Create password"
required>

</div>

</div>
<div class="mb-3">

<label class="form-label">

Confirm Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-check-circle"></i>

</span>

<input
type="password"
id="register-confirm-password"
class="form-control"
placeholder="Confirm password"
required>

</div>

</div>

<button
type="submit"
class="btn btn-primary w-100 rounded-pill py-3 fw-semibold">

<i class="fas fa-user-plus me-2"></i>

Create Account

</button>

</form>

<div class="text-center mt-4">

<p class="mb-0 text-muted">

Already have an account?

<a
href="login.html"
class="fw-bold text-primary text-decoration-none">

Sign In

</a>

</p>

</div>

</div>

</div>

</div>

</div>

</div>

<div id="toast-container"></div>

<div id="footer-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/components.js"></script>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/theme.js"></script>

</body>

</html>
