<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | ShopSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://kit.fontawesome.com/70a642cd7c.js"
            crossorigin="anonymous"></script>

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <link rel="stylesheet"
          href="../assets/css/navbar.css">

    <link rel="stylesheet"
          href="../assets/css/auth.css">

    <link rel="stylesheet"
          href="../assets/css/footer.css">

    <link rel="stylesheet"
          href="../assets/css/toast.css">

    <link rel="stylesheet"
          href="../assets/css/theme.css">

    <link rel="stylesheet"
          href="../assets/css/responsive.css">

</head>

<body class="bg-light">

<div id="navbar-container"></div>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-8">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<div class="text-center mb-4">

<h2 class="fw-bold">

Welcome Back

</h2>

<p class="text-muted">

Sign in to continue shopping with ShopSphere

</p>

</div>

<div class="d-grid gap-3 mb-4">

<button
type="button"
class="btn btn-light border rounded-pill py-3 social-btn">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
class="social-logo me-2"
alt="Google">

Continue with Google

</button>

<button
type="button"
class="btn btn-light border rounded-pill py-3 social-btn">

<i class="fab fa-facebook text-primary me-2"></i>

Continue with Facebook

</button>

<button
type="button"
class="btn btn-light border rounded-pill py-3 social-btn">

<i class="fab fa-apple me-2"></i>

Continue with Apple

</button>

</div>

<div class="text-center mb-4">

<span class="text-muted">

──────── OR ────────

</span>

</div>

<form id="login-form">

<div class="mb-3">

<label class="form-label">

Username / Email / Phone Number

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-user"></i>

</span>

<input
type="text"
id="login-email"
class="form-control"
placeholder="Enter username, email or phone"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-lock"></i>

</span>

<input
type="password"
id="login-password"
class="form-control"
placeholder="Enter your password"
required>

<button
class="btn btn-outline-secondary"
type="button"
id="toggle-password">

<i class="fas fa-eye"></i>

</button>

</div>

</div>

<div class="d-flex justify-content-between align-items-center mb-4">

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="remember-me">

<label
class="form-check-label"
for="remember-me">

Remember me

</label>

</div>

<a
href="#"
class="text-decoration-none">

Forgot Password?

</a>

</div>

<button
type="submit"
class="btn btn-primary w-100 rounded-pill py-3 fw-semibold">

<i class="fas fa-sign-in-alt me-2"></i>

Sign In

</button>

</form>
<div class="text-center mt-4">

<p class="mb-0 text-muted">

New to ShopSphere?

<a
href="register.html"
class="fw-bold text-primary text-decoration-none">

Create Account

</a>

</p>

</div>

</div>

</div>

</div>

</div>

</div>

<div id="toast-container"></div>

<div id="footer-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/components.js"></script>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/theme.js"></script>

</body>

</html>
